  <text x="380" y="341" font-family="Segoe UI, sans-serif" font-size="20" fill="#cbe6ff">Hello from client thread 04</text>
  <text x="495" y="421" font-family="Segoe UI, sans-serif" font-size="20" fill="#00394d">/name roshan-node</text>
  <text x="380" y="501" font-family="Segoe UI, sans-serif" font-size="20" fill="#cbe6ff">Message delivery acknowledged</text>
